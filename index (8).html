<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Notebook App</title>
<style>
body { font-family: Arial; margin:0; padding:10px; }
textarea { width:100%; height:80vh; }
button { margin:5px; }
</style>
</head>
<body>

<h2>Notebook</h2>

<button onclick="exportNotes()">Export</button>
<input type="file" onchange="importNotes(event)">
<button onclick="copyText()">Copy</button>

<textarea id="note"></textarea>

<script>
let notes = JSON.parse(localStorage.getItem('notes') || '[""]');

function save(){
  localStorage.setItem('notes', JSON.stringify(notes));
}

const textarea = document.getElementById('note');
textarea.value = notes[0];

textarea.addEventListener('input', ()=>{
  notes[0] = textarea.value;
  save();
});

function exportNotes(){
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(notes));
  const dl = document.createElement('a');
  dl.setAttribute("href", dataStr);
  dl.setAttribute("download", "notes_backup.json");
  dl.click();
}

function importNotes(e){
  const file = e.target.files[0];
  const reader = new FileReader();
  reader.onload = function(evt){
    notes = JSON.parse(evt.target.result);
    save();
    textarea.value = notes[0];
  };
  reader.readAsText(file);
}

function copyText(){
  navigator.clipboard.writeText(textarea.value);
  alert("Copied");
}
</script>

</body>
</html>
